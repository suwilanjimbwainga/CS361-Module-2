<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Student Registration</h1>
    <nav>
      <ul>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="register.html">Register</a></li>
        <li><a href="table.html">Results</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <article>
      <h2>CS 361 Student Registration Form</h2>

      <form action="#" method="POST">

        <!-- PERSONAL DETAILS -->
        <fieldset>
          <legend>Personal Details</legend>

          <div class="form-group">
            <label for="fullname">Full Name <span class="required">*</span></label>
            <input type="text" id="fullname" name="fullname" required placeholder="e.g. John Doe">
          </div>

          <div class="form-group">
            <label for="email">Email Address <span class="required">*</span></label>
            <input type="email" id="email" name="email" required placeholder="e.g. john@example.com">
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="e.g. +234 800 000 0000">
          </div>

          <div class="form-group">
            <label for="dob">Date of Birth <span class="required">*</span></label>
            <input type="date" id="dob" name="dob" required>
          </div>

          <div class="form-group">
            <fieldset>
              <legend>Gender</legend>
              <label>
                <input type="radio" name="gender" value="male" required> Male
              </label>
              <label>
                <input type="radio" name="gender" value="female"> Female
              </label>
              <label>
                <input type="radio" name="gender" value="other"> Other
              </label>
            </fieldset>
          </div>

          <div class="form-group">
            <label for="photo">Profile Photo</label>
            <input type="file" id="photo" name="photo" accept="image/*">
          </div>

        </fieldset>

        <!-- ACADEMIC DETAILS -->
        <fieldset>
          <legend>Academic Details</legend>

          <div class="form-group">
            <label for="student-id">Student ID <span class="required">*</span></label>
            <input type="text" id="student-id" name="student_id"
              pattern="[A-Z]{2}[0-9]{2}[0-9]{6}"
              required placeholder="e.g. CS2300001"
              title="Format: 2 letters, 2 digits, 6 digits (e.g. CS2300001)">
          </div>

          <div class="form-group">
            <label for="programme">Programme <span class="required">*</span></label>
            <select id="programme" name="programme" required>
              <option value="">-- Select Programme --</option>
              <option value="CS">Computer Science</option>
              <option value="IT">Information Technology</option>
              <option value="IS">Information Systems</option>
            </select>
          </div>

          <div class="form-group">
            <label for="year">Year of Study <span class="required">*</span></label>
            <input type="number" id="year" name="year" min="1" max="5" required placeholder="1–5">
          </div>

          <div class="form-group">
            <fieldset>
              <legend>Specialisation (select all that apply)</legend>
              <label>
                <input type="checkbox" name="specialisation" value="Web"> Web
              </label>
              <label>
                <input type="checkbox" name="specialisation" value="Security"> Security
              </label>
              <label>
                <input type="checkbox" name="specialisation" value="AI"> AI
              </label>
              <label>
                <input type="checkbox" name="specialisation" value="Networks"> Networks
              </label>
            </fieldset>
          </div>

          <div class="form-group">
            <label for="bio">Tell us about yourself <span class="required">*</span></label>
            <textarea id="bio" name="bio" rows="4" required
              placeholder="Write a short bio about yourself..."></textarea>
          </div>

        </fieldset>

        <!-- SUBMIT -->
        <fieldset>
          <legend>Submit</legend>
          <div class="form-buttons">
            <button type="submit">Register</button>
            <button type="reset">Reset Form</button>
          </div>
        </fieldset>

      </form>
    </article>
  </main>

  <footer>
    <p>Contact: <a href="mailto:suwilanjimbwainga13@gmail.com">suwilanjimbwainga13@gmail.com</a></p>
  </footer>

</body>
</html>
